<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>
  // 카카오톡 인앱 브라우저는 target="_blank"를 무시하고 같은 화면에서 이동시켜, 상품 링크를
  // 눌렀다 돌아오면 링크트리가 아니라 토스/쿠팡 중간 페이지가 남아있는 문제가 있음(인앱 브라우저
  // 자체의 제약, target=_blank로는 해결 불가). 카톡 안에서 열렸으면 즉시 외부 브라우저로 이동시켜
  // 우회 — 외부 브라우저에서는 상품 링크가 정상적으로 새 탭에서 열려 이 페이지가 그대로 유지됨.
  (function () {
    var ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf("kakaotalk") === -1) return;
    var url = location.href;
    if (/iphone|ipad|ipod/.test(ua)) {
      location.href = "kakaotalk://web/openExternal?url=" + encodeURIComponent(url);
    } else {
      location.href = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;end";
    }
  })();
</script>
<title>핫딜요정| 오늘 소개된 핫딜 모음</title>
<meta name="description" content="오늘 소개된 핫딜 모음" />
<meta property="og:type" content="website" />
<meta property="og:title" content="핫딜요정| 오늘 소개된 핫딜 모음" />
<meta property="og:description" content="오늘 소개된 핫딜 모음" />
<meta property="og:url" content="https://hotdeal-fairy.github.io/hotdeal/" />
<meta property="og:image" content="https://hotdeal-fairy.github.io/hotdeal/images/profile.jpg" />
<!-- style.css 수정 시마다 ?v= 뒤 숫자를 올려 브라우저 캐시 무효화 (별도 빌드 단계가 없는 정적 사이트라 수동 관리) -->
<link rel="stylesheet" href="style.css?v=6" />

<main>
  <div class="profile" id="profile"></div>

  <div id="openchat"></div>

  <div id="banners"></div>

  <div class="mall-tabs" id="mall-tabs"></div>
  <p class="mall-disclosure" id="mall-disclosure"></p>
  <div id="products"></div>

  <p class="status" id="status" hidden>불러오는 중 문제가 발생했어요.</p>
</main>

<script>
  fetch("data.json")
    .then((res) => res.json())
    .then(render)
    .catch(() => {
      document.getElementById("status").hidden = false;
    });

  function formatRelativeTime(ts) {
    const diffMin = (Date.now() / 1000 - ts) / 60;
    if (diffMin < 1) return "방금";
    if (diffMin < 60) return `${Math.floor(diffMin)}분 전`;
    const diffHour = diffMin / 60;
    if (diffHour < 24) return `${Math.floor(diffHour)}시간 전`;
    return `${Math.floor(diffHour / 24)}일 전`;
  }

  function render(data) {
    if (data.theme?.accent) {
      document.documentElement.style.setProperty("--accent", data.theme.accent);
    }

    const p = data.profile ?? {};
    document.getElementById("profile").innerHTML = `
      ${
        p.avatar
          ? `<div class="profile-avatar"><img src="${p.avatar}" alt="${p.name ?? ""}" /></div>`
          : ""
      }
      <div class="profile-text">
        <h1>${p.name ?? ""}${p.bio ? ` | ${p.bio}` : ""}</h1>
      </div>
    `;

    const oc = data.openChat ?? {};
    document.getElementById("openchat").innerHTML = oc.url
      ? `
        <a class="openchat-button" href="${oc.url}" target="_blank" rel="noopener">
          ${oc.icon ?? "💬"} ${oc.title ?? "오픈채팅방 참여하기"}
        </a>
      `
      : "";

    document.getElementById("banners").innerHTML = `
      <div class="banner-list">
        ${(data.banners ?? [])
          .map(
            (banner, i) => `
              <a class="banner-card banner-c${(i % 3) + 1}" href="${banner.url}" target="_blank" rel="noopener">
                <strong>${banner.title ?? ""}</strong>
                <small>${banner.description ?? ""}</small>
              </a>
            `
          )
          .join("")}
      </div>
    `;

    const malls = data.malls ?? [];

    document.getElementById("mall-tabs").innerHTML = malls
      .map(
        (mall, i) => `
          <button class="mall-tab-btn${i === 0 ? " active" : ""}" data-mall="${mall.id}">
            ${mall.name}
          </button>
        `
      )
      .join("");

    document.getElementById("mall-tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".mall-tab-btn");
      if (!btn) return;
      document
        .querySelectorAll(".mall-tab-btn")
        .forEach((b) => b.classList.toggle("active", b === btn));
      renderMall(malls.find((m) => m.id === btn.dataset.mall));
    });

    function renderMall(mall) {
      if (!mall) return;
      document.getElementById("mall-disclosure").textContent = mall.disclosure ?? "";
      document.getElementById("products").innerHTML = `
        <div class="products-grid">
          ${(mall.products ?? [])
            .map(
              (product) => `
              <div class="product-card">
                <a href="${product.url}" target="_blank" rel="noopener">
                  <img src="${product.image}" alt="${product.name}" loading="lazy" referrerpolicy="no-referrer" />
                </a>
                <p class="product-name">${product.name}</p>
                <p class="product-price-row">
                  <span class="product-price">${product.price}</span>
                  ${
                    product.discount_rate != null
                      ? `<span class="product-discount">▼${product.discount_rate}%</span>`
                      : ""
                  }
                  ${
                    product.priceAt
                      ? `<span class="product-price-at">${formatRelativeTime(product._ts)}</span>`
                      : ""
                  }
                </p>
              </div>
            `
            )
            .join("")}
        </div>
      `;
    }

    renderMall(malls[0]);
  }
</script>
